apiVersion: v1
kind: Pod
metadata:
  name: quotes-app-pod
  labels:
    app: quotes-app
spec:
  containers:
  - name: quotes-app
    image: quotes_img:latest
    ports:
    - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: quotes-app-service
spec:
  selector:
    app: quotes-app
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: NodePort
